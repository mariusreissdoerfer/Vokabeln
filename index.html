<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vokabellernapp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Vokabellernapp</h1>

    <div class="mode-selector">
      <button id="btn-de-en" class="mode-btn active" onclick="setMode('de-en')">
        Deutsch → Englisch
      </button>
      <button id="btn-en-de" class="mode-btn" onclick="setMode('en-de')">
        Englisch → Deutsch
      </button>
    </div>

    <div class="progress-bar-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <div id="progress-text" class="progress-text">0 / 0</div>

    <div id="card" class="card">
      <div id="question-label" class="question-label"></div>
      <div id="question" class="question"></div>
      <input
        id="answer-input"
        class="answer-input"
        type="text"
        placeholder="Antwort eingeben..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="check-btn" class="check-btn" onclick="checkAnswer()">Prüfen</button>
      <div id="feedback" class="feedback hidden"></div>
      <div id="correct-answer" class="correct-answer hidden"></div>
      <button id="next-btn" class="next-btn hidden" onclick="nextCard()">Weiter →</button>
    </div>

    <div id="result-screen" class="result-screen hidden">
      <h2>Runde abgeschlossen! 🎉</h2>
      <div id="score-text" class="score-text"></div>
      <div id="wrong-list-container" class="wrong-list-container hidden">
        <h3>Falsch beantwortet:</h3>
        <ul id="wrong-list"></ul>
      </div>
      <button class="restart-btn" onclick="restart()">Nochmal starten</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
